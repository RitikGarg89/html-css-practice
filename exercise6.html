<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 6</title>
    <style>
        body {
            display: flex;
            gap: 8px;
            height: inherit;
        }

        .index__aside {
            flex: 1;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #D9C9F6;
            border: 2px solid #CAC3E3;
            border-radius: 5px;
        }

        .index__main {
            flex: 3;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #D7E7FE;
            border: 2px solid #D0DDF0;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <aside class="index__aside">
        <h2>SideBar</h2>
    </aside>
    <main class="index__main">
        <h2>Main Content</h2>
    </main>
</body>

</html>
