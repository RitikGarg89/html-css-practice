<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2</title>
    <style>
        .card__container {
            width: 50%;
            aspect-ratio: 1.25/1;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #F5EFFD;
            border: 2px solid #DDDBE3;
            border-radius: 5%;
        }

        .card {
            width: 50%;
            aspect-ratio: 1.25/1;
            background-color: #C6A7F3;
            border: 2px solid #AA90E3;
            border-radius: 5%;
        }
    </style>
</head>

<body>
    <div class="card__container">
        <div class="card"></div>
    </div>
</body>

</html>
