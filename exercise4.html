<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4</title>
    <style>
        .cards__container {
            margin: auto;
            width: 90%;
            height: 310px;
            background-color: lightblue;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
        }

        .card {
            margin: 5px 5px;
            background-color: aqua;
            border: 2px solid;
        }
    </style>
</head>

<body>
    <div class="cards__container">
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
        <div class="card"></div>
    </div>
</body>

</html>
