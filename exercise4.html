<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4</title>
    <style>
        .cards__container {
            margin: auto;
            width: 90%;
            aspect-ratio: 1.5/1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2%;
        }

        .card {
            margin: 5px 5px;
            border-radius: 8px;
        }

        .card--red {
            background-color: #FEC1C8;
            border: 2px solid #F9B0BB;
        }

        .card--blue {
            background-color: #C3DBFD;
            border: 2px solid #D7E8F7;
        }

        .card--green {
            background-color: #C9ECCB;
            border: 2px solid #B7DCBC;
        }

        .card--yellow {
            background-color: #FAF1CD;
            border: 2px solid #FEEBA9;
        }
    </style>
</head>

<body>
    <div class="cards__container">
        <div class="card card--red"></div>
        <div class="card card--blue"></div>
        <div class="card card--green"></div>
        <div class="card card--yellow"></div>
    </div>
</body>

</html>
