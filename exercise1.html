<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise !</title>
    <style>
        .container {
            margin: auto;
            width: 90%;
            display: flex;
            gap: 4%;
            padding: 4%;
            border: 1px solid black;
            border-radius: 5px;
        }

        .cards {
            flex: 1;
            aspect-ratio: 1.25/1;
            background-color: lightblue;
            border-radius: 10%;
        }

        .card--red {
            background-color: #FDC3D1;
            border-color: #f1a2b4;
        }

        .card--blue {
            background-color: #C2DAFE;
            border-color: #8ba0bf;
        }

        .card--green {
            background-color: #B8EAC7;
            border-color: #81af8f;
        }

        .card--yellow {
            background-color: #FEE799;
            border-color: #bdac74;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class='cards card--red'></div>
        <div class='cards card--blue'></div>
        <div class='cards card--green'></div>
        <div class='cards card--yellow'></div>
    </div>
</body>

</html>
