<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9</title>
    <style>
        .product {
            width: 500px;
            margin: auto;
            display: flex;
            gap: 8px;
            align-items: stretch;
            /* margin: auto;
            display: flex;
            width: 80%;
            height: 260px;
            gap: 8px; */
        }

        .product__images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            flex: 1;
        }

        .product__preview {
            background-color: #D9F0EA;
            grid-column: span 3;
            border: 2px solid green;
            border-radius: 10px;
        }

        .product__image {
            aspect-ratio: 3/4;
            background-color: #D9F0EA;
            border: 2px solid green;
            border-radius: 10px;
        }

        .product__details {
            flex: 1;
            display: flex;
            padding: 8px;
            flex-direction: column;
            border: 2px solid;
            border-radius: 10px;
        }

        .product__name {
            margin: 0;
            font-size: x-large;
        }

        .product__price {
            margin-top: 2px;
            color: green;
            font-weight: bolder;
            font-size: large;
        }

        .product__description {
            margin-top: 2px;
            font-weight: bolder;
            font-size: medium;
        }

        .product__btns {
            display: flex;
            height: 50%;
            flex-direction: column;
            justify-content: flex-end;
        }

        .product__btn {
            padding: 4px;
            margin: 4px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            color: white
        }

        .btn--addToCart {
            background-color: #036DE2;
        }

        .btn--buyNow {
            background-color: #2ABB6C;
        }

        .css--yellow {
            background-color: #FEE799;
            border-color: #e2bd41;
        }
    </style>
</head>

<body>
    <main class="product">
        <div class="product__images">
            <img src="" alt="Main Image" class="product__preview">
            <img src="" alt="side image" class="product__image">
            <img src="" alt="side image" class="product__image">
            <img src="" alt="side image" class="product__image">
        </div>
        <div class="product__details css--yellow">
            <h1 class="product__name">Awesome Product</h1>
            <p class="product__price">$49.99</p>
            <p class="product__description">This is a great product that solves a problem and looks amazing while doing
                lkmdsfkldfskjdflsknjkdsndfskjkj
                it.</p>
            <div class="product__btns">

                <button class="product__btn btn--addToCart">Add to cart</button>
                <button class="product__btn btn--buyNow">buy Now</button>
            </div>
        </div>
    </main>
</body>

</html>
