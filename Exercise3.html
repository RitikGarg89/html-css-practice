<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3</title>
    <style>
        .navbar {
            width: 90%;
            margin: auto;
            display: flex;
            align-items: center;
            background-color: lightgray;
        }

        .nav__logo {
            margin: 0;
            background-color: lightcyan;
        }

        .nav__menu {
            flex: 1;
        }

        .nav__list {
            list-style: none;
            display: flex;
            justify-content: flex-end;
            gap: 40px;
            margin: 0;
            padding: 0;
        }

        .nav__link {
            width: 15%;
            text-align: center;
            background-color: lightblue;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <h1 class="nav__logo">Exercise 3</h1>
        <nav class="nav__menu">
            <ul class="nav__list">
                <li class="nav__link">menu 1</li>
                <li class="nav__link">menu 2</li>
                <li class="nav__link">menu 3</li>
            </ul>
        </nav>
    </header>
</body>

</html>
