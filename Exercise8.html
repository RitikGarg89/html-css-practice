<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8</title>
    <style>
        body {
            margin: 5%;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 40px 320px 80px;
            gap: 8px;
        }

        header {
            background-color: lightblue;
            grid-column: span 3;
            text-align: center;
            align-content: center;
            border: 1px solid rgb(136, 208, 233);
            border-radius: 10px;
        }

        aside {
            background-color: lightslategray;
            text-align: center;
            align-content: center;
            border: 1px solid rgb(77, 88, 99);
            border-radius: 10px;
        }

        main {
            background-color: lightgreen;
            text-align: center;
            align-content: center;
            border: 1px solid rgb(94, 240, 94);
            border-radius: 10px;
        }

        .widgets {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .widget {
            flex: 1;
            text-align: center;
            background-color: lightyellow;
            align-content: center;
            border: 1px solid yellow;
            border-radius: 10px;
        }

        footer {
            background-color: lightblue;
            grid-column: span 3;
            text-align: center;
            align-content: center;
            border: 1px solid rgb(136, 208, 233);
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <header>Header</header>
    <aside>aside</aside>
    <main>Main</main>
    <div class="widgets">
        <div class="widget">Widget 1</div>
        <div class="widget">Widget 2</div>
    </div>
    <footer>footer</footer>
</body>

</html>
