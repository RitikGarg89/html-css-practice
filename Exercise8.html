<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8</title>
    <style>
        body {
            margin: 10px;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 10% 400px 80px;
            gap: 8px;
        }

        .index__header {
            grid-column: span 3;
            text-align: center;
            align-content: center;
            border: 1px solid;
            border-radius: 8px;
        }

        .index__sidebar {
            text-align: center;
            align-content: center;
            border: 1px solid;
            border-radius: 8px;
        }

        .index__main {
            text-align: center;
            align-content: center;
            border: 1px solid;
            border-radius: 8px;
        }

        .index__widgets {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .widget {
            flex: 1;
            text-align: center;
            align-content: center;
            border: 1px solid;
            border-radius: 8px;
        }

        .index__footer {
            grid-column: span 3;
            text-align: center;
            align-content: center;
            border: 1px solid;
            border-radius: 8px;
        }

        .css--red {
            background-color: #FDC3D1;
            border-color: #f1a2b4;
        }

        .css--blue {
            background-color: #C2DAFE;
            border-color: #8ba0bf;
        }

        .css--green {
            background-color: #B8EAC7;
            border-color: #81af8f;
        }

        .css--yellow {
            background-color: #FEE799;
            border-color: #bdac74;
        }

        .css--purple {
            background-color: #C6A7F3;
            border-color: #AA90E3;
        }
    </style>
</head>

<body>
    <header class="index__header css--blue">Header</header>
    <aside class="index__sidebar css--purple">aside</aside>
    <main class="index__main css--green">Main</main>
    <div class="index__widgets">
        <div class="widget css--yellow">Widget 1</div>
        <div class="widget css--yellow">Widget 2</div>
    </div>
    <footer class="index__footer css--purple">footer</footer>
</body>

</html>
